<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<title>タスク管理エージェント</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --bg2:#161616; --bg3:#1e1e1e;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --text:#f0f0f0; --text2:#888; --text3:#444;
  --accent:#e8ff6b; --accent-dim:rgba(232,255,107,0.1);
  --danger:#ff5c5c; --danger-dim:rgba(255,92,92,0.1);
  --warn:#ffaa44; --warn-dim:rgba(255,170,68,0.1);
  --success:#4ade80; --info:#6b9fff;
  --mono:'JetBrains Mono',monospace; --sans:'Instrument Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;}
body{min-height:100dvh;max-width:720px;margin:0 auto;padding:0 0 160px;}
.header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.92);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.logo{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:0.1em;}
.hbadges{display:flex;gap:6px;}
.hb{font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:99px;border:1px solid;}
.hb-n{border-color:var(--border2);color:var(--text2);}
.hb-ov{border-color:rgba(255,92,92,0.4);color:var(--danger);background:var(--danger-dim);}
.notify{background:var(--warn-dim);border-bottom:1px solid rgba(255,170,68,0.2);padding:10px 20px;font-size:13px;color:var(--warn);font-family:var(--mono);display:none;}
/* PC入力フォーム */
.input-sec{padding:18px 20px;border-bottom:1px solid var(--border);}
.sec-lbl{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-full{grid-column:1/-1;}
.field-lbl{font-size:11px;font-family:var(--mono);color:var(--text2);margin-bottom:5px;}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;transition:border-color .15s;}
.fi:focus{border-color:rgba(232,255,107,0.4);}
.fi::placeholder{color:var(--text3);}
.form-foot{display:flex;justify-content:flex-end;}
.sbtn{background:var(--accent);color:#0f0f0f;border:none;border-radius:8px;padding:9px 24px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.sbtn:hover{opacity:.88;}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;}
.tab{padding:11px 16px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px;transition:all .15s;font-family:var(--sans);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
/* Task list */
.tsec{padding:14px 20px;}
.tlist{display:flex;flex-direction:column;gap:7px;}
.empty{text-align:center;padding:48px;font-family:var(--mono);font-size:12px;color:var(--text3);}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;display:flex;gap:12px;align-items:flex-start;transition:border-color .12s;}
.tcard:hover{border-color:var(--border2);}
.tcard.ov{border-color:rgba(255,92,92,0.25);background:rgba(255,92,92,0.03);}
.tcard.done{opacity:.4;}
.chk{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.chk:hover{border-color:var(--accent);background:var(--accent-dim);}
.chk.on{background:var(--success);border-color:var(--success);}
.chk.on::after{content:'✓';font-size:10px;color:#0f0f0f;font-weight:700;}
.tbody{flex:1;min-width:0;}
.tname{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tcard.done .tname{text-decoration:line-through;color:var(--text3);}
.tmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.mi{font-size:11px;font-family:var(--mono);color:var(--text2);}
.msep{color:var(--text3);}
.tag{font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 7px;border-radius:99px;}
.tag-ov{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(255,92,92,0.2);}
.tag-soon{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(255,170,68,0.2);}
.turl{font-size:11px;font-family:var(--mono);color:var(--info);margin-top:5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;}
.turl:hover{text-decoration:underline;}
.dbtn{width:27px;height:27px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.dbtn:hover{background:var(--danger-dim);color:var(--danger);border-color:rgba(255,92,92,0.2);}
/* Settings */
.setup{padding:20px;}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
.sh{font-size:13px;font-weight:600;margin-bottom:14px;}
.slbl{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.srow{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.si{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:12px;font-family:var(--mono);color:var(--text);outline:none;transition:border-color .15s;}
.si:focus{border-color:rgba(232,255,107,0.4);}
.si::placeholder{color:var(--text3);}
.sfbtn{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:8px 14px;font-size:12px;font-family:var(--mono);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.sfbtn:hover{border-color:var(--accent);color:var(--accent);}
.fhint{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:10px;line-height:1.8;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.ok{background:var(--success);}
.dot.ng{background:var(--text3);}
.dfmt{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 14px;font-size:12px;font-family:var(--mono);color:var(--text2);line-height:2;margin-bottom:10px;}
.dfmt .hl{color:var(--accent);}
/* スマホ用フォーム（画面下部固定） */
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:rgba(15,15,15,0.97);border-top:1px solid var(--border);padding:10px 14px 24px;display:none;flex-direction:column;gap:7px;backdrop-filter:blur(12px);}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.bf{grid-column:1/-1;}
.bi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;}
.bi:focus{border-color:rgba(232,255,107,0.4);}
.bi::placeholder{color:var(--text3);font-size:12px;}
.badd{background:var(--accent);color:#0f0f0f;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;width:100%;}
@media(max-width:480px){.input-sec{display:none;}.bottom{display:flex;}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
.loading{text-align:center;padding:32px;font-family:var(--mono);font-size:12px;color:var(--text3);}
</style>
</head>
<body>
<div class="notify" id="notify"></div>
<header class="header">
  <div class="logo">TASK_AGENT</div>
  <div class="hbadges">
    <span class="hb hb-n" id="totalB">-件</span>
    <span class="hb hb-ov" id="overdueB" style="display:none"></span>
  </div>
</header>

<!-- PC入力フォーム -->
<section class="input-sec">
  <div class="sec-lbl">タスク登録</div>
  <div class="form-grid">
    <div class="form-full">
      <div class="field-lbl">タスク名 *</div>
      <input class="fi" id="fName" placeholder="議事録作成" />
    </div>
    <div>
      <div class="field-lbl">依頼者</div>
      <input class="fi" id="fReq" placeholder="田中さん" />
    </div>
    <div>
      <div class="field-lbl">期限</div>
      <input class="fi" id="fDue" type="datetime-local" />
    </div>
    <div class="form-full">
      <div class="field-lbl">参考URL</div>
      <input class="fi" id="fUrl" type="url" placeholder="https://..." />
    </div>
  </div>
  <div class="form-foot">
    <button class="sbtn" onclick="addTask()">追加</button>
  </div>
</section>

<div class="tabs">
  <button class="tab on" onclick="switchTab('active',this)">未処理</button>
  <button class="tab" onclick="switchTab('done',this)">完了</button>
  <button class="tab" onclick="switchTab('setup',this)">設定</button>
</div>

<div id="view-active" class="tsec"><div class="tlist" id="activeList"><div class="loading">読み込み中...</div></div></div>
<div id="view-done" class="tsec" style="display:none"><div class="tlist" id="doneList"></div></div>
<div id="view-setup" class="setup" style="display:none">

  <div class="scard">
    <div class="sh">Supabase 接続設定</div>
    <div class="slbl">Supabase URL</div>
    <div class="srow"><input class="si" id="sbUrl" placeholder="https://xxxx.supabase.co" /></div>
    <div class="slbl">Anon Key</div>
    <div class="srow">
      <input class="si" id="sbKey" placeholder="eyJhbGci..." />
      <div class="dot ng" id="sbDot"></div>
    </div>
    <button class="sfbtn" onclick="saveSupabase()">接続して保存</button>
  </div>

  <div class="scard">
    <div class="sh">Discordからのタスク登録（改行区切り）</div>
    <div class="fhint">Botのチャンネルに以下の形式で投稿してください。1行目のタスク名のみ必須です。</div>
    <div class="dfmt">
      <span class="hl">タスク名</span><br>
      依頼者（省略可）<br>
      5/10 15:00（期限・省略可）<br>
      https://...（URL・省略可）
    </div>
    <div class="fhint">
      コマンド：<span class="hl">!tasks</span>（一覧）&nbsp;
      <span class="hl">!done 1</span>（完了）&nbsp;
      <span class="hl">!help</span>（ヘルプ）
    </div>
  </div>

</div>

<!-- スマホ用フォーム -->
<div class="bottom">
  <div class="bg">
    <div class="bf"><input class="bi" id="bName" placeholder="タスク名 *" /></div>
    <input class="bi" id="bReq" placeholder="依頼者" />
    <input class="bi" id="bDue" type="datetime-local" />
    <div class="bf"><input class="bi" id="bUrl" type="url" placeholder="参考URL (https://...)" /></div>
  </div>
  <button class="badd" onclick="addMobile()">追加</button>
</div>

<script>
const LS_URL='ta_sb_url', LS_KEY='ta_sb_key';
let sb=null, ch=null, currentTab='active';

function initSb(url,key){
  try{ sb=window.supabase.createClient(url,key); document.getElementById('sbDot').className='dot ok'; return true; }
  catch{ document.getElementById('sbDot').className='dot ng'; return false; }
}
function saveSupabase(){
  const url=document.getElementById('sbUrl').value.trim();
  const key=document.getElementById('sbKey').value.trim();
  if(!url||!key){alert('URLとKeyを入力してください。');return;}
  localStorage.setItem(LS_URL,url); localStorage.setItem(LS_KEY,key);
  if(initSb(url,key)){alert('接続しました！');loadTasks();subscribeRT();}
}
function subscribeRT(){
  if(!sb||ch)return;
  ch=sb.channel('tc').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>loadTasks()).subscribe();
}
async function loadTasks(){
  if(!sb)return;
  const{data,error}=await sb.from('tasks').select('*').order('deadline',{ascending:true,nullsFirst:false});
  if(error){console.error(error);return;}
  renderAll(data||[]);
}

function buildTask(name,req,dueVal,url){
  return{name,requester:req||'',deadline:dueVal?new Date(dueVal).toISOString():null,url:url||'',done:false,reminded:false,last_overdue:null};
}
async function insertTask(t){
  if(!sb){alert('先に設定タブでSupabaseを接続してください。');return;}
  const{error}=await sb.from('tasks').insert(t);
  if(error)alert('保存失敗: '+error.message);
}

async function addTask(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('タスク名を入力してください。');return;}
  await insertTask(buildTask(name,document.getElementById('fReq').value.trim(),document.getElementById('fDue').value,document.getElementById('fUrl').value.trim()));
  ['fName','fReq','fDue','fUrl'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fName').focus();
}
async function addMobile(){
  const name=document.getElementById('bName').value.trim();
  if(!name){alert('タスク名を入力してください。');return;}
  await insertTask(buildTask(name,document.getElementById('bReq').value.trim(),document.getElementById('bDue').value,document.getElementById('bUrl').value.trim()));
  ['bName','bReq','bDue','bUrl'].forEach(id=>document.getElementById(id).value='');
}

async function toggleDone(id,cur){if(!sb)return;await sb.from('tasks').update({done:!cur}).eq('id',id);}
async function deleteTask(id){if(!sb)return;if(!confirm('削除しますか？'))return;await sb.from('tasks').delete().eq('id',id);}

function fmt(iso){const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function st(t){
  if(t.done)return'done';if(!t.deadline)return'normal';
  const n=Date.now();if(new Date(t.deadline)<n)return'ov';
  if(new Date(t.deadline)-n<2*3600000)return'soon';return'normal';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderAll(tasks){
  const active=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done);
  const ov=active.filter(t=>t.deadline&&new Date(t.deadline)<new Date());
  document.getElementById('totalB').textContent=active.length+'件';
  const ob=document.getElementById('overdueB');
  if(ov.length){ob.style.display='';ob.textContent='超過 '+ov.length;}else ob.style.display='none';
  renderList(active,'activeList');renderList(done,'doneList');
  if(ov.length)showNotify(`期限超過が${ov.length}件あります！`);
}
function renderList(tasks,id){
  const el=document.getElementById(id);
  if(!tasks.length){el.innerHTML='<div class="empty">タスクなし</div>';return;}
  el.innerHTML=tasks.map(t=>{
    const s=st(t);
    let tag='';
    if(s==='ov')tag='<span class="tag tag-ov">OVERDUE</span>';
    else if(s==='soon')tag='<span class="tag tag-soon">SOON</span>';
    return`<div class="tcard ${s==='ov'?'ov':''} ${t.done?'done':''}">
      <div class="chk ${t.done?'on':''}" onclick="toggleDone('${t.id}',${t.done})"></div>
      <div class="tbody">
        <div class="tname">${esc(t.name)}</div>
        <div class="tmeta">
          ${t.requester?`<span class="mi">${esc(t.requester)}</span>`:''}
          ${t.deadline?`<span class="msep">·</span><span class="mi">${fmt(t.deadline)}</span>`:''}
          ${tag}
        </div>
        ${t.url?`<a class="turl" href="${esc(t.url)}" target="_blank" rel="noopener">${esc(t.url)}</a>`:''}
      </div>
      <button class="dbtn" onclick="deleteTask('${t.id}')">✕</button>
    </div>`;
  }).join('');
}
function showNotify(msg){const el=document.getElementById('notify');el.textContent='⚠ '+msg;el.style.display='block';setTimeout(()=>el.style.display='none',8000);}
function switchTab(tab,btn){
  currentTab=tab;
  ['active','done','setup'].forEach(v=>document.getElementById('view-'+v).style.display=v===tab?'':'none');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
}
function init(){
  const url=localStorage.getItem(LS_URL),key=localStorage.getItem(LS_KEY);
  if(url&&key){
    document.getElementById('sbUrl').value=url;document.getElementById('sbKey').value=key;
    if(initSb(url,key)){loadTasks();subscribeRT();}
  }else{
    document.getElementById('activeList').innerHTML='<div class="empty">設定タブでSupabaseを接続してください</div>';
    document.querySelector('.tab:last-child').click();
  }
}
init();setInterval(loadTasks,60000);
</script>
</body>
</html>
